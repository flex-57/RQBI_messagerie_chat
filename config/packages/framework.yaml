framework:
  secret: '%env(APP_SECRET)%'
  http_method_override: false
  php_errors:
    log: true
  cache:
    app: cache.adapter.filesystem
    default_redis_provider: 'redis://localhost'
  session:
    handler_id: null
    cookie_secure: auto
    cookie_samesite: lax
    storage_factory_id: session.storage.factory.native
  serializer:
    format_listener: true
